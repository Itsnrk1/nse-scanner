name: Daily NSE Scan

on:
  schedule:
    - cron: 30 10 * * 1-5
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install yfinance pandas nselib

      - name: Run the scan
        run: python nse_daily_scanner.py

      - name: Commit updated results
        run: |
          git config user.name nse-scan-bot
          git config user.email actions@users.noreply.github.com
          git add index.html
          git diff --quiet --cached || git commit -m Daily-scan-results
          git push
